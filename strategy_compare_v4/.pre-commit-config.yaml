# ============================================================
# Institutional Strategy Comparison Platform V4
# .pre-commit-config.yaml
# ============================================================

repos:

# ============================================================
# General File Checks
# ============================================================

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0

  hooks:

    - id: trailing-whitespace
      files: ^strategy_compare_v4/

    - id: end-of-file-fixer
      files: ^strategy_compare_v4/

    - id: check-yaml
      files: ^strategy_compare_v4/

    - id: check-json
      files: ^strategy_compare_v4/

    - id: check-toml
      files: ^strategy_compare_v4/

    - id: check-added-large-files
      args:
        - --maxkb=5000

    - id: check-merge-conflict

    - id: mixed-line-ending
      args:
        - --fix=lf
      files: ^strategy_compare_v4/

# ============================================================
# Ruff
# ============================================================

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.22

  hooks:

    - id: ruff
      files: ^strategy_compare_v4/
      args:
        - --fix

    - id: ruff-format
      files: ^strategy_compare_v4/

# ============================================================
# Black
# ============================================================

- repo: https://github.com/psf/black
  rev: 26.5.1

  hooks:

    - id: black
      language_version: python3.12
      files: ^strategy_compare_v4/

# ============================================================
# MyPy
# ============================================================

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.16.1

  hooks:
    - id: mypy

      name: mypy (Strategy Compare V4)

      files: ^strategy_compare_v4/

      language_version: python3.12

      additional_dependencies:
        - pandas-stubs
        - types-openpyxl
        - types-requests
        - streamlit
        - pytest
        - plotly
        - matplotlib

      args:
        - --config-file=strategy_compare_v4/mypy.ini
        - --explicit-package-bases

# ============================================================
# Markdown
# ============================================================

- repo: https://github.com/executablebooks/mdformat
  rev: 1.0.0

  hooks:

    - id: mdformat
      files: ^strategy_compare_v4/

# ============================================================
# Local Hooks
# ============================================================

- repo: local

  hooks:

    - id: pytest
      name: Run PyTest
      entry: pytest strategy_compare_v4/tests
      language: system
      pass_filenames: false
      stages:
        - pre-push

    - id: project-structure
      name: Verify Project Imports
      entry: python -m compileall strategy_compare_v4
      language: system
      pass_filenames: false
      stages:
        - pre-push
