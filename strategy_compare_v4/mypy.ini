[mypy]
python_version = 3.12

# Output
pretty = True
show_error_codes = True
show_column_numbers = True
color_output = True

# Practical settings
ignore_missing_imports = True
check_untyped_defs = False
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True

# Exclude legacy projects and standalone scripts
exclude = (?x)(
    ^strategy_compare_v2/
  | ^strategy_compare_v3/
  | ^strategy_compare_streamlit/
  | ^scanner_f\.py$
  | ^scanner_wf\.py$
  | ^screener_f\.py$
  | ^screener_wf\.py$
)

# Ignore Streamlit typing noise
[mypy-streamlit.*]
ignore_missing_imports = True

[mypy-plotly.*]
ignore_missing_imports = True

[mypy-yfinance.*]
ignore_missing_imports = True

[mypy-ta.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True
