[mypy]
python_version = 3.12

pretty = True
show_error_codes = True
show_column_numbers = True
color_output = True

ignore_missing_imports = True
check_untyped_defs = False

warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True

exclude = ^(strategy_compare_v2|strategy_compare_v3|strategy_compare_streamlit|scanner_f\.py|scanner_wf\.py|screener_f\.py|screener_wf\.py)

[mypy-streamlit.*]
ignore_missing_imports = True

[mypy-plotly.*]
ignore_missing_imports = True

[mypy-yfinance.*]
ignore_missing_imports = True

[mypy-ta.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True


#[mypy-strategy_compare_v4.streamlit_app.*]
#ignore_errors = True

[mypy-streamlit]
ignore_missing_imports = True
